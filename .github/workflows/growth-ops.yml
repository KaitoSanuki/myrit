name: growth-ops

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Manual worker
        run: npm run cron:worker
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      DRY_RUN_POSTING: ${{ vars.DRY_RUN_POSTING || 'true' }}
      X_USER_ACCESS_TOKEN: ${{ secrets.X_USER_ACCESS_TOKEN }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_API_BASE_URL: ${{ vars.THREADS_API_BASE_URL || 'https://graph.threads.net' }}
      COMPETITOR_POSTS_JSON: ${{ secrets.COMPETITOR_POSTS_JSON }}
